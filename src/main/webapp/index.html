<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gameverseacademy – Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
:root {
    --sidebar-w: 270px;
    --bg: #07050f; --bg2: #0d0a1a; --panel: #110e22; --panel2: #1a1530;
    --purple: #8b5cf6; --purple-bright: #a78bfa;
    --pink: #ec4899; --pink-bright: #f472b6;
    --blue: #3b82f6; --blue-bright: #60a5fa; --cyan: #22d3ee;
    --white: #f0eaff; --dim: #7c6fa0;
    --border: rgba(139,92,246,0.18); --border-bright: rgba(139,92,246,0.45);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
}

/* BLOBS – Match dashboard style */
.blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.12;
}
.blob-1 { width: 600px; height: 600px; background: var(--purple); top: -200px; left: -100px; }
.blob-2 { width: 500px; height: 500px; background: var(--pink); bottom: -150px; right: -50px; }
.blob-3 { width: 400px; height: 400px; background: var(--blue); top: 35%; left: 35%; }

/* CARD – Enhanced glassmorphism */
.card {
    background: rgba(17,14,34,0.95);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 440px;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(139,92,246,0.1);
    animation: fadeUp 0.6s ease;
    position: relative;
    z-index: 10;
}
.card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--purple), var(--pink), transparent);
    border-radius: 16px 16px 0 0;
}

/* TITLE – Orbitron gradient */
.title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 30px;
    background: linear-gradient(135deg, var(--purple-bright), var(--pink-bright), var(--blue-bright));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* FORM GROUPS */
.form-group { margin-bottom: 20px; position: relative; }
label {
    font-size: 0.65rem;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    color: var(--dim);
    margin-bottom: 8px;
    display: block;
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* INPUTS – Match dashboard search style */
.input-wrap { position: relative; display: flex; align-items: center; }
input {
    width: 100%;
    padding: 13px 16px;
    border-radius: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: all 0.3s;
}
input::placeholder { color: var(--dim); }
input:focus {
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(139,92,246,0.15);
}

/* PASSWORD TOGGLE */
.toggle-pw {
    position: absolute;
    right: 12px;
    background: none;
    border: none;
    color: var(--dim);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s;
}
.toggle-pw:hover { color: var(--purple-bright); }
.toggle-pw svg { width: 18px; height: 18px; }

/* BUTTONS – Match dashboard gradient style */
.btn-login {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: white;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(139,92,246,0.3);
    margin-top: 8px;
}
.btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(139,92,246,0.5);
}
.btn-login:active { transform: translateY(0); }

/* CANCEL BUTTON */
.btn-cancel {
    margin-top: 12px;
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--dim);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.25s;
}
.btn-cancel:hover {
    border-color: var(--pink);
    color: var(--pink-bright);
    background: rgba(236,72,153,0.08);
}

/* REMEMBER ME */
.remember {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.8rem;
    color: var(--dim);
    margin: 16px 0 8px;
    font-family: 'Rajdhani', sans-serif;
}
.remember input[type="checkbox"] {
    accent-color: var(--purple);
    width: 16px;
    height: 16px;
    cursor: pointer;
}

/* FORGOT PASSWORD */
.forgot {
    font-size: 0.8rem;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--dim);
    font-family: 'Rajdhani', sans-serif;
}
.forgot svg { width: 16px; height: 16px; flex-shrink: 0; }
.forgot a {
    color: var(--pink-bright);
    text-decoration: none;
    font-weight: 600;
    transition: opacity 0.2s;
}
.forgot a:hover {
    text-decoration: underline;
    opacity: 0.9;
}

/* ANIMATION */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
}

/* SCROLLBAR – Match dashboard */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { 
    background: linear-gradient(var(--purple), var(--pink)); 
    border-radius: 99px; 
}

/* RESPONSIVE */
@media (max-width: 480px) {
    .card { padding: 30px 24px; margin: 16px; }
    .title { font-size: 1.2rem; }
    .blob-1, .blob-2, .blob-3 { opacity: 0.08; }
}
</style>
</head>
<body>

<!-- Background Blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- Login Card -->
<div class="card">
  <div class="title">⚡ Gameverse Login</div>

  <form action="LoginController" method="POST">
    
    <!-- Login Field -->
    <div class="form-group">
      <label for="login">Email or Username</label>
      <div class="input-wrap">
        <input
          type="text"
          id="login"
          name="login"
          placeholder="admin@gameverseacademy.ma"
          autocomplete="username"
          required
        />
      </div>
    </div>

    <!-- Password Field -->
    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          required
        />
        <button type="button" class="toggle-pw" onclick="togglePassword()" aria-label="Show/Hide password">
          <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Forgot Password -->
    <div class="forgot">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path stroke-linecap="round" d="M12 8v4m0 4h.01"/>
      </svg>
      Forgot your <a href="#">Password?</a>
    </div>

    <!-- Remember Me -->
    <label class="remember">
      <input type="checkbox" name="remember" value="true" checked />
      Remember me
    </label>

    <!-- Submit Button -->
    <button type="submit" class="btn-login">Log In</button>

    <!-- Cancel Button -->
    <button type="button" class="btn-cancel" onclick="history.back()">Cancel</button>

  </form>
</div>

<script>
  function togglePassword() {
    const pw = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (pw.type === 'password') {
      pw.type = 'text';
      icon.innerHTML = `
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8
                 a18.45 18.45 0 015.06-5.94"/>
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8
                 a18.5 18.5 0 01-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"
              stroke-linecap="round"/>`;
    } else {
      pw.type = 'password';
      icon.innerHTML = `
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
        <circle cx="12" cy="12" r="3"/>`;
    }
  }
</script>

</body>
</html>
